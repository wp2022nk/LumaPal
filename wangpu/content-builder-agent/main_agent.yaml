# Main content writer agent configuration.
# 后续新增主工具、skill 或子智能体配置文件时，优先改这里，不需要改 Python 代码。

name: content-writer

model:
  name: qwen3.6-plus
  env_model: QWEN_TEXT_MODEL
  env_api_key: QWEN_API_KEY
  env_base_url: QWEN_BASE_URL
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

system_prompt_file: AGENTS.md
memory:
  - /wangpu/content-builder-agent/AGENTS.md

skills:
  - /wangpu/content-builder-agent/skills/

tools:
  - generate_cover
  - generate_social_image

subagents_config: subagents.yaml

backend:
  type: local_shell
  # Standard Deep Agents backend root. Generated artifacts still default to /output.
  root_dir: ../..
  virtual_mode: true
  local_shell:
    python: D:\Robort_Learn\envs\deepagents\python.exe
    allowed_commands:
      - python
      - pytest
      - node
      - npm
      - powershell
      - pwsh
      - mkdir
    require_confirmation: false
  remote:
    provider: null
    sandbox_id: null
    setup_script: null

output_root: ../../output

thread_id: content-builder-console

conversation:
  # MemorySaver 本身不提供 max_turns 参数；这里由应用层在每轮调用前裁剪 checkpoint
  # 中的 messages，只保留最近 N 条用户消息开始的对话轮次。设置为 null 或 0 表示不限制。
  max_turns: 10
